name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Validate (PRs + main)
  # -------------------------------------------------------------------

  lint_pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10.29.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter app-shared run build
      - run: pnpm --filter app-pwa run lint

  lint_server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10.29.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter app-shared run build
      - run: pnpm --filter app-server exec prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
      - run: pnpm --filter app-server run lint

  test_server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10.29.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter app-shared run build
      - run: pnpm --filter app-server run test

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx bake -f deployment/docker-bake.hcl

  # -------------------------------------------------------------------
  # Publish (main only)
  # -------------------------------------------------------------------

  build_and_push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          echo "VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}" >> app-pwa/.env
          echo "VITE_SITE_ADDRESS=${{ secrets.VITE_SITE_ADDRESS }}" >> app-pwa/.env
      - run: TAG=${{ github.run_number }} docker buildx bake -f deployment/docker-bake.hcl --push
